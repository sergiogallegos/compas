name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build installers and
# publish a draft GitHub Release with Windows, macOS, and Linux artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build installers (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/compas-dj/frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Install frontend deps
        working-directory: apps/compas-dj/frontend
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ---- In-app auto-update signing (tauri-plugin-updater) -------------------
          # Generate locally with: `cd apps/compas-dj/frontend && npx tauri signer generate -w ~/.tauri/compas.key`
          # then paste the *private* key into TAURI_SIGNING_PRIVATE_KEY and the *public* key
          # into apps/compas-dj/src-tauri/tauri.conf.json (plugins.updater.pubkey). With both set, tauri-action
          # produces a signed `latest.json` next to the installers — the updater verifies it.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ---- macOS bundle signing + notarization (DISABLED until a Developer ID is set up) --------
          # Passing empty APPLE_* secrets makes tauri-action attempt `security import` on an empty
          # certificate and fail the macOS bundle ("SecKeychainItemImport: parameters not valid").
          # So we leave them unset for now: the .app/.dmg still builds, just unsigned — users see
          # "unidentified developer" (right-click → Open), as the website already documents. To enable
          # signing later, add the APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_SIGNING_IDENTITY
          # / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID repo secrets and restore them here.

          # ---- Windows code-signing (optional; pick one path) ----------------------
          # PFX cert in a secret:  WINDOWS_CERTIFICATE (base64 .pfx) + WINDOWS_CERTIFICATE_PASSWORD.
          # Tauri picks these up automatically when bundle.windows.signCommand is set in tauri.conf.json.
          # Azure Trusted Signing is the modern alternative — wire it via a separate signing step
          # before the tauri-action call. Leaving unset just ships an unsigned .msi/.nsis.
        with:
          # The project root that CONTAINS src-tauri/ (not src-tauri itself); the Tauri CLI
          # resolves src-tauri/tauri.conf.json from here, same as `cd apps/compas-dj && tauri build`.
          projectPath: apps/compas-dj
          tagName: ${{ github.ref_name }}
          releaseName: "Compás DJ ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
