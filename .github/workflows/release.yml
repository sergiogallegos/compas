name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build installers and
# publish a draft GitHub Release with Windows, macOS, and Linux artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build installers (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/compas-dj/frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Install frontend deps
        working-directory: apps/compas-dj/frontend
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # ---- In-app auto-update signing (tauri-plugin-updater) -------------------
          # Generate locally with: `cd apps/compas-dj/frontend && npx tauri signer generate -w ~/.tauri/compas.key`
          # then paste the *private* key into TAURI_SIGNING_PRIVATE_KEY and the *public* key
          # into apps/compas-dj/src-tauri/tauri.conf.json (plugins.updater.pubkey). With both set, tauri-action
          # produces a signed `latest.json` next to the installers — the updater verifies it.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # ---- macOS bundle signing + notarization ---------------------------------
          # Required for distribution outside the Mac App Store (Gatekeeper). Without these,
          # the .dmg is still produced but users see "developer cannot be verified" on first run.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}                 # base64 .p12 cert
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}       # "Developer ID Application: …"
          APPLE_ID: ${{ secrets.APPLE_ID }}                                   # Apple account email
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}                       # app-specific password
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # ---- Windows code-signing (optional; pick one path) ----------------------
          # PFX cert in a secret:  WINDOWS_CERTIFICATE (base64 .pfx) + WINDOWS_CERTIFICATE_PASSWORD.
          # Tauri picks these up automatically when bundle.windows.signCommand is set in tauri.conf.json.
          # Azure Trusted Signing is the modern alternative — wire it via a separate signing step
          # before the tauri-action call. Leaving unset just ships an unsigned .msi/.nsis.
        with:
          projectPath: apps/compas-dj/src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Compás DJ ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
