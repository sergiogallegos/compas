# cargo-deny policy. Run locally with:
#   cargo deny check
#
# Keep exceptions narrow and documented. If an advisory is accepted temporarily,
# add its RUSTSEC id with a short rationale and an owner/date in this file.

[graph]
all-features = true

[advisories]
version = 2
# Current exceptions are transitive through Tauri's Linux/GTK/urlpattern stack and have no
# safe direct upgrade in compas. Revisit when Tauri updates those dependency chains.
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error via glib/gtk macros
    "RUSTSEC-2024-0411", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0412", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0413", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0414", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0415", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0416", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0417", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0418", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0419", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2024-0420", # gtk-rs GTK3 binding via Tauri Linux stack
    "RUSTSEC-2025-0075", # unic-char-range via tauri-utils/urlpattern
    "RUSTSEC-2025-0080", # unic-common via tauri-utils/urlpattern
    "RUSTSEC-2025-0081", # unic-char-property via tauri-utils/urlpattern
    "RUSTSEC-2025-0098", # unic-ucd-version via tauri-utils/urlpattern
    "RUSTSEC-2025-0100", # unic-ucd-ident via tauri-utils/urlpattern
]
yanked = "deny"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
